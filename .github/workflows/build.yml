name: Build Firmware

on:
  push:
    branches:
      - master
      - 'feature/**'
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - env: GD32F130C8T6_MASTER
            role: MASTER
          - env: GD32F130C8T6_SLAVE
            role: SLAVE
      fail-fast: false

    defaults:
      run:
        working-directory: HoverBoardGigaDevice

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: pio-${{ runner.os }}-${{ hashFiles('HoverBoardGigaDevice/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build ${{ matrix.role }}
        run: pio run -e ${{ matrix.env }}

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.role }}
          path: |
            HoverBoardGigaDevice/.pio/build/${{ matrix.env }}/firmware.elf
            HoverBoardGigaDevice/.pio/build/${{ matrix.env }}/firmware.bin
          retention-days: 30
