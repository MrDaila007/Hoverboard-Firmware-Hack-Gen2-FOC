; PlatformIO Project Configuration File
;
; Build (sinusoidal commutation, default):
;   pio run -e GD32F130C8T6_MASTER
;   pio run -e GD32F130C8T6_SLAVE
;
; Build (classic 6-step block commutation):
;   pio run -e GD32F130C8T6_MASTER_BLOCK
;   pio run -e GD32F130C8T6_SLAVE_BLOCK

[platformio]
src_dir = Src
include_dir = Inc
default_envs = GD32F130C8T6_MASTER

[env]
platform = ststm32
board = gd32f130c8
framework = spl
platform_packages =
    maxgerhardt/framework-spl@2.10302.0
debug_tool = jlink
upload_protocol = jlink
build_flags = -IInc
extra_scripts = add_nanolib.py
check_tool = cppcheck
check_skip_packages = yes
check_flags =
    cppcheck: --enable=warning,performance,portability --inline-suppr
check_src_filters =
    +<Src/>
    +<Inc/>
    -<Inc/gd32f1x0_libopt.h>

[env:GD32F130C8T6_MASTER]
build_flags = ${env.build_flags} -DMASTER -DSINUSOIDAL

[env:GD32F130C8T6_SLAVE]
build_flags = ${env.build_flags} -DSLAVE -DSINUSOIDAL

[env:GD32F130C8T6_MASTER_BLOCK]
build_flags = ${env.build_flags} -DMASTER

[env:GD32F130C8T6_SLAVE_BLOCK]
build_flags = ${env.build_flags} -DSLAVE

; Backward-compatible alias (same as MASTER)
[env:GD32F130C8T6]
extends = GD32F130C8T6_MASTER
