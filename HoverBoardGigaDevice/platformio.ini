; PlatformIO Project Configuration File
;
; Build:
;   pio run -e GD32F130C8T6_MASTER
;   pio run -e GD32F130C8T6_SLAVE

[platformio]
src_dir = Src
include_dir = Inc
default_envs = GD32F130C8T6_MASTER

[env]
platform = ststm32
board = gd32f130c8
framework = spl
platform_packages =
    maxgerhardt/framework-spl@2.10302.0
debug_tool = jlink
upload_protocol = jlink
build_flags = -IInc
extra_scripts = add_nanolib.py

[env:GD32F130C8T6_MASTER]
build_flags = ${env.build_flags} -DMASTER

[env:GD32F130C8T6_SLAVE]
build_flags = ${env.build_flags} -DSLAVE

; Backward-compatible alias (same as MASTER)
[env:GD32F130C8T6]
extends = GD32F130C8T6_MASTER
